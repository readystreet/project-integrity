<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Integrity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- ================================================================== -->
    <!-- SIDEBAR                                                            -->
    <!-- ================================================================== -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">

        <!-- Brand -->
        <div class="sidebar-brand">
            <div class="sidebar-logo" aria-hidden="true">
                <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="8" fill="#002D4E"/>
                    <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
                          font-family="Inter, sans-serif" font-weight="700" font-size="16" fill="#ffffff">PI</text>
                </svg>
            </div>
            <span class="sidebar-title">Project Integrity</span>
        </div>

        <!-- Navigation (dynamically populated by app.js buildSidebar()) -->
        <nav id="sidebar-nav" class="sidebar-nav">
            <!-- JS will inject Dashboard link, Workstream groups, and sub-items here -->
        </nav>

        <!-- Sidebar Footer -->
        <div class="sidebar-footer">
            <button class="sidebar-ai-btn" disabled title="AI Expert Advisory — Coming in Phase 3">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M2 14l2-2h10a2 2 0 002-2V4a2 2 0 00-2-2H4a2 2 0 00-2 2v10z"
                          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="7" cy="7" r="1" fill="currentColor"/>
                    <circle cx="10" cy="7" r="1" fill="currentColor"/>
                    <circle cx="13" cy="7" r="1" fill="currentColor"/>
                </svg>
                <span>AI Assistant</span>
                <span class="badge badge--muted" style="font-size:10px;padding:2px 6px;">Phase 3</span>
            </button>
        </div>
    </aside>

    <!-- Sidebar mobile overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- ================================================================== -->
    <!-- HEADER                                                             -->
    <!-- ================================================================== -->
    <header class="header" role="banner">

        <!-- Mobile hamburger -->
        <button class="header-hamburger" id="hamburger-btn" data-action="toggle-sidebar"
                aria-label="Toggle navigation" aria-controls="sidebar" aria-expanded="false">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2"
                      stroke-linecap="round"/>
            </svg>
        </button>

        <!-- Breadcrumb -->
        <nav id="breadcrumb" class="header-breadcrumb" aria-label="Breadcrumb">
            <span class="breadcrumb-item breadcrumb-item--active">Dashboard</span>
        </nav>

        <!-- Right actions -->
        <div class="header-actions">
            <!-- Search -->
            <div class="header-search">
                <svg class="header-search-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.6"/>
                    <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
                <input type="text" id="header-search-input" class="header-search-input"
                       placeholder="Search tasks..." aria-label="Search tasks">
            </div>

            <!-- Notification Bell (placeholder) -->
            <button class="header-icon-btn" aria-label="Notifications" title="Notifications">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                    <path d="M10 2a5 5 0 00-5 5v3l-1.5 2.5h13L15 10V7a5 5 0 00-5-5z"
                          stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M8 16.5a2.5 2.5 0 005 0" stroke="currentColor" stroke-width="1.6"
                          stroke-linecap="round"/>
                </svg>
            </button>

            <!-- User Avatar (placeholder) -->
            <button class="header-avatar" aria-label="User menu" title="User menu">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
                    <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.4"/>
                    <circle cx="14" cy="11" r="4" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M6 23c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="1.4"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ================================================================== -->
    <!-- MAIN CONTENT AREA                                                  -->
    <!-- All view content is rendered dynamically by app.js                 -->
    <!-- ================================================================== -->
    <main class="main-content" id="main-content" role="main">
        <!-- JS renders Dashboard, Workstream, or Task Detail views here -->
    </main>

    <!-- ================================================================== -->
    <!-- TOAST CONTAINER                                                    -->
    <!-- ================================================================== -->
    <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

    <!-- ================================================================== -->
    <!-- LOADING OVERLAY                                                    -->
    <!-- ================================================================== -->
    <div class="loading-overlay" id="loading-overlay" role="status" aria-label="Loading">
        <div class="loading-content">
            <div class="spinner spinner--lg"></div>
            <p class="loading-text">Loading Project Integrity...</p>
        </div>
    </div>

    <!-- ================================================================== -->
    <!-- SCRIPTS                                                            -->
    <!-- ================================================================== -->
    <script src="js/app.js"></script>
</body>
</html>
